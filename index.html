<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="container">
        
        <h1 class="display-number">0</h1>
        <button class="back-btn">⌫</button>
        <button class="ac-btn">AC</button>
        <button class="FC-btn math">&#x2109</button>
        <button class="divide-btn number-math math">÷</button>
        <button class="seven-btn number-math">7</button>
        <button class="eight-btn number-math">8</button>
        <button class="nine-btn number-math">9</button>
        <button class="times-btn number-math math">×</button>
        <button class="four-btn number-math">4</button>
        <button class="five-btn number-math">5</button>
        <button class="six-btn number-math">6</button>
        <button class="minus-btn number-math math">-</button>
        <button class="one-btn number-math">1</button>
        <button class="two-btn number-math">2</button>
        <button class="three-btn number-math">3</button>
        <button class="plus-btn number-math math">&#43</button>
        <button class="negative-btn math">&#177</button>
        <button class="zero-btn number-math">0</button>
        <button class="period-btn number-math">.</button>
        <button class="equals-btn equals">&#61</button>
    </section>

<script src="app.js"></script>
</body>
</html>
